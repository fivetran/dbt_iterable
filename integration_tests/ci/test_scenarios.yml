# Only set if not using default adapter ranges
# dbt_adapter_versions:
#   snowflake: ">=1.3.0,<2.0.0"
#   bigquery: ">=1.3.0,<2.0.0"
#   postgres: ">=1.3.0,<2.0.0"
#   redshift: ">=1.3.0,<2.0.0"
#   databricks: ">=1.6.0,<2.0.0"

schema_variable_name: "iterable_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: true

  - name: "bigquery json data"
    vars:
      iterable_user_history_identifier: "user_history_bq_json_data"
    include_incremental: false
    warehouses: ["bigquery"]

  - name: "passthrough columns"
    vars:
      iterable_user_history_pass_through_columns: [{"name": "phone_number_updated_at"}]
      iterable_event_extension_pass_through_columns: [{"name": "web_push_message"}]
    include_incremental: false

  - name: "features disabled"
    vars:
      iterable__using_campaign_label_history: false
      iterable__using_user_unsubscribed_message_type_history: false
      iterable__using_campaign_suppression_list_history: false
      iterable__using_event_extension: false
    include_incremental: true
